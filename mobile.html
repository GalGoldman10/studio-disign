<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<title>Jewelry Studio Layout</title>
<!-- mobile.html version: edit-button-touch-toggle-fix -->
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;min-height:100%;overflow:hidden;background:#0D0C0B;overscroll-behavior:none}
:root{
  --bg:#0D0C0B;--surface:#131110;--panel:#0F0E0D;--canvas-bg:#0A0908;
  --gold:#C8923A;--gold-dim:rgba(200,146,58,0.18);--gold-bright:#E0A84A;
  --text:#EDE6DC;--text2:#9C9288;--text3:#6A6058;
  --bd:rgba(255,255,255,0.08);--bd2:rgba(255,255,255,0.16);
  --red:rgba(180,60,60,0.9);--red-dim:rgba(180,60,60,0.15);
  --shadow:0 20px 60px rgba(0,0,0,.45);
}
body{font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;color:var(--text);-webkit-font-smoothing:antialiased}
button,input{font:inherit}
#app{display:flex;flex-direction:column;width:100vw;height:100dvh;background:var(--bg);overflow:hidden;border:0}

#topbar{
  display:flex;align-items:center;justify-content:space-between;gap:10px;
  min-height:52px;padding:8px max(12px,env(safe-area-inset-right)) 8px max(12px,env(safe-area-inset-left));
  background:linear-gradient(180deg,#14110F,#0F0E0D);border-bottom:1px solid var(--bd);flex-shrink:0;z-index:30
}
.topbar-left{display:flex;align-items:center;gap:10px;min-width:0;flex:1}
.studio-icon{width:28px;height:28px;display:flex;align-items:center;justify-content:center;color:var(--gold);border:1px solid var(--bd2);border-radius:9px;background:rgba(200,146,58,.08);flex-shrink:0}
.project-name{width:min(360px,48vw);padding:8px 10px;border:1px solid transparent;border-radius:9px;background:rgba(255,255,255,0.045);color:var(--text);font-size:14px;font-weight:650;letter-spacing:.01em;outline:none;transition:all .15s;min-width:120px}
.project-name:hover{border-color:var(--bd2);background:rgba(255,255,255,0.065)}
.project-name:focus{border-color:var(--gold);background:rgba(200,146,58,0.08);box-shadow:0 0 0 3px rgba(200,146,58,0.13)}
.project-name::placeholder{color:var(--text3)}
.studio-sub{font-size:12px;color:var(--text3);flex-shrink:0;white-space:nowrap}
.topbar-right{display:flex;gap:7px;align-items:center;flex-shrink:0}
.tbtn{min-height:38px;display:flex;align-items:center;justify-content:center;gap:6px;padding:8px 12px;font-size:13px;border-radius:10px;cursor:pointer;border:1px solid var(--bd2);background:rgba(255,255,255,.025);color:var(--text2);transition:all .15s;-webkit-tap-highlight-color:transparent}
.tbtn:hover{background:rgba(255,255,255,0.07);color:var(--text);border-color:rgba(255,255,255,0.22)}
.tbtn.primary{border-color:rgba(200,146,58,.68);color:var(--gold-bright);background:rgba(200,146,58,.07)}
.tbtn.primary:hover{background:var(--gold-dim)}
.tbtn.ok{border-color:#3A6A3A;color:#65B565}
.tbtn.danger{border-color:rgba(160,50,50,0.5);color:#D1867C}
.tbtn.danger:hover{background:var(--red-dim)}
.icon-only{width:38px;padding:0}

#body{display:grid;grid-template-columns:220px minmax(0,1fr) 230px;flex:1;min-height:0;overflow:hidden}

#sb{background:var(--surface);border-right:1px solid var(--bd);overflow-y:auto;flex-shrink:0;padding:12px 10px 18px;-webkit-overflow-scrolling:touch}
#sb::-webkit-scrollbar,#pp::-webkit-scrollbar{width:4px;height:4px}
#sb::-webkit-scrollbar-thumb,#pp::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.14);border-radius:3px}
.cat-head{font-size:10px;font-weight:750;color:var(--text3);text-transform:uppercase;letter-spacing:.12em;padding:12px 6px 7px;margin-top:6px;white-space:nowrap}
.cat-head:first-child{margin-top:0;padding-top:2px}
.pi{display:flex;align-items:center;gap:9px;min-height:40px;padding:9px 10px;border-radius:10px;cursor:grab;font-size:13px;color:var(--text2);user-select:none;border:1px solid transparent;margin-bottom:3px;transition:all .12s;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
.pi:hover{background:rgba(255,255,255,0.055);border-color:var(--bd2);color:var(--text)}
.pi:active{cursor:grabbing;transform:scale(.985)}
.pi .tap-add{margin-left:auto;color:var(--gold);font-size:14px;opacity:.8}
.pd{width:10px;height:10px;border-radius:3px;flex-shrink:0}
.help-note{font-size:11px;line-height:1.45;color:var(--text3);padding:8px 6px 10px;border-bottom:1px solid var(--bd);margin-bottom:4px}

#cw{position:relative;min-width:0;overflow:auto;background:#080706;-webkit-overflow-scrolling:touch;touch-action:pan-x pan-y;scrollbar-color:#28221b #080706;contain:layout size}
#cw::-webkit-scrollbar{width:8px;height:8px}
#cw::-webkit-scrollbar-track{background:#080706}
#cw::-webkit-scrollbar-thumb{background:#28221b;border-radius:4px}
#zoombar{position:sticky;top:10px;left:10px;z-index:12;width:max-content;display:flex;align-items:center;gap:6px;margin:10px;pointer-events:auto;background:rgba(15,14,13,.86);border:1px solid var(--bd2);box-shadow:0 8px 24px rgba(0,0,0,.28);border-radius:12px;padding:5px;backdrop-filter:blur(10px)}
.zbtn{min-width:38px;height:34px;border-radius:9px;border:1px solid transparent;background:transparent;color:var(--text2);cursor:pointer;font-size:13px;-webkit-tap-highlight-color:transparent}
.zbtn:disabled{opacity:.36;cursor:not-allowed}
 .edit-zbtn{min-width:110px;height:48px;padding:0 18px;color:#FFD58A;font-weight:950;font-size:15px;letter-spacing:.09em;text-transform:uppercase;border:2px solid rgba(224,168,74,.82);background:rgba(200,146,58,.18);box-shadow:0 8px 22px rgba(0,0,0,.32),0 0 0 2px rgba(200,146,58,.08)}
.edit-zbtn:not(:disabled):hover{background:rgba(200,146,58,.22);border-color:rgba(224,168,74,.78);color:#FFD58A}
.edit-zbtn.is-open{background:rgba(200,146,58,.24);border-color:rgba(224,168,74,.9);color:#FFD58A}
.zbtn:hover{background:rgba(255,255,255,.06);border-color:var(--bd2);color:var(--text)}
#zoom-label{font-size:12px;color:var(--gold);min-width:44px;text-align:center;font-weight:650}
#canvas-shell{position:relative;margin:12px 12px 28px 12px;transform-origin:0 0;will-change:width,height,margin}
#cv{
  position:absolute;left:0;top:0;width:960px;height:720px;transform-origin:0 0;will-change:transform;
  background-color:var(--canvas-bg);
  background-image:
    linear-gradient(rgba(255,255,255,0.055) 1px,transparent 1px),
    linear-gradient(90deg,rgba(255,255,255,0.055) 1px,transparent 1px),
    linear-gradient(rgba(200,146,58,0.07) 1px,transparent 1px),
    linear-gradient(90deg,rgba(200,146,58,0.07) 1px,transparent 1px);
  background-size:40px 40px,40px 40px,200px 200px,200px 200px;
  border-radius:2px;box-shadow:0 0 0 1px rgba(200,146,58,.18),0 18px 70px rgba(0,0,0,.42)
}
#cv::after{content:'';position:absolute;inset:0;border:1px solid rgba(200,146,58,0.22);pointer-events:none;border-radius:2px}
#dl{position:absolute;bottom:10px;left:12px;font-size:10px;color:rgba(255,255,255,0.18);pointer-events:none;letter-spacing:.04em}

.fi{position:absolute;border-radius:6px;display:flex;align-items:center;justify-content:center;cursor:move;font-size:11px;font-weight:650;text-align:center;line-height:1.2;padding:4px;border:1px solid rgba(255,255,255,0.1);user-select:none;overflow:visible;transition:filter .12s,box-shadow .12s;-webkit-tap-highlight-color:transparent;touch-action:none}
.fi:hover{filter:brightness(1.15);z-index:10}
.fi.sel{outline:2px solid var(--gold);outline-offset:3px;z-index:20;filter:brightness(1.12);box-shadow:0 0 0 7px rgba(200,146,58,.08)}
.fl{pointer-events:none;word-break:break-word;max-width:100%;padding:2px;overflow:hidden}
.rh{position:absolute;bottom:-9px;right:-9px;width:22px;height:22px;border-radius:7px;background:var(--gold);cursor:se-resize;z-index:5;border:2px solid #0A0908;box-shadow:0 4px 12px rgba(0,0,0,.35);touch-action:none}
.rh::after{content:'';position:absolute;right:5px;bottom:5px;width:7px;height:7px;border-right:2px solid rgba(0,0,0,.45);border-bottom:2px solid rgba(0,0,0,.45)}

#pp{background:var(--surface);border-left:1px solid var(--bd);overflow-y:auto;display:flex;flex-direction:column;min-width:0;-webkit-overflow-scrolling:touch}
.pp-top{padding:14px 14px;border-bottom:1px solid var(--bd);flex-shrink:0;display:flex;align-items:center;justify-content:space-between;gap:8px}
.pph{font-size:10px;font-weight:750;color:var(--text3);text-transform:uppercase;letter-spacing:.12em}
.sheet-close{display:none;border:1px solid var(--bd2);background:rgba(255,255,255,.035);color:var(--text2);border-radius:9px;width:36px;height:32px;cursor:pointer}
#pb{padding:14px;flex:1}
.ppl{font-size:12px;color:var(--text2);margin-bottom:6px;margin-top:14px}
.ppl:first-of-type{margin-top:0}
.ppi{width:100%;min-height:42px;padding:9px 11px;font-size:14px;border:1px solid rgba(255,255,255,0.12);border-radius:10px;background:rgba(255,255,255,0.045);color:var(--text);outline:none;transition:border-color .15s}
.ppi:focus{border-color:var(--gold);box-shadow:0 0 0 3px rgba(200,146,58,.1)}
.dbt{width:100%;margin-top:16px;min-height:42px;padding:9px;border-radius:10px;border:1px solid rgba(160,60,60,0.45);background:transparent;color:#D1867C;cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;gap:6px;transition:all .12s}
.dbt:hover{background:var(--red-dim);border-color:rgba(180,70,70,0.7);color:#E09890}
.ns{color:var(--text3);font-size:13px;text-align:center;margin-top:40px;line-height:1.75}
.mobile-tip{display:none;color:var(--text3);font-size:11px;line-height:1.45;margin-top:10px;text-align:center}
.color-row{display:flex;flex-wrap:wrap;gap:7px;margin-top:7px}
.csw{width:28px;height:28px;border-radius:8px;cursor:pointer;border:2px solid transparent;transition:transform .1s,border-color .1s;-webkit-tap-highlight-color:transparent}
.csw:hover{transform:scale(1.08)}
.csw.active{border-color:var(--gold-bright);box-shadow:0 0 0 2px rgba(224,168,74,.18)}
.divider{height:1px;background:var(--bd);margin:14px 0}
.stat-row{display:flex;justify-content:space-between;font-size:12px;color:var(--text2);margin-top:8px}
.stat-val{color:var(--gold);font-weight:700}
.nudge-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-top:8px}
.nudge-grid button{min-height:34px;border-radius:8px;border:1px solid var(--bd2);background:rgba(255,255,255,.035);color:var(--text2);cursor:pointer}
.nudge-grid button:hover{border-color:var(--gold);color:var(--gold)}
.nudge-grid button:nth-child(2){grid-column:2}
.nudge-grid button:nth-child(3){grid-column:1}
.nudge-grid button:nth-child(4){grid-column:3}
.nudge-grid button:nth-child(5){grid-column:2}

.fi.kind-zone{background:rgba(200,146,58,0.055)!important;border:1px dashed rgba(200,146,58,0.62)!important;color:var(--gold-bright)!important;font-size:14px;font-weight:800;text-transform:uppercase;letter-spacing:.08em;box-shadow:inset 0 0 0 999px rgba(200,146,58,0.02)}
.fi.kind-zone .fl{padding:5px 8px;background:rgba(10,9,8,0.58);border:1px solid rgba(200,146,58,0.18);border-radius:999px;max-width:calc(100% - 12px)}
.fi.kind-door{background:rgba(200,146,58,0.045)!important;border:2px solid var(--gold)!important;color:var(--gold-bright)!important;overflow:visible}
.fi.kind-door::before{content:'';position:absolute;left:2px;bottom:2px;width:calc(100% - 8px);height:calc(100% - 8px);border-top:2px solid rgba(224,168,74,0.82);border-right:2px solid rgba(224,168,74,0.82);border-radius:0 100% 0 0;pointer-events:none;opacity:.75}
.fi.kind-door .fl{position:absolute;left:50%;bottom:-20px;transform:translateX(-50%);padding:2px 6px;border-radius:5px;background:#0A0908;color:var(--gold-bright);font-size:10px;white-space:nowrap;border:1px solid rgba(200,146,58,0.25)}
.fi.kind-window{background:rgba(96,160,216,0.04)!important;border:2px solid #60A0D8!important;color:#83BCE6!important;overflow:visible}
.fi.kind-window::before{content:'';position:absolute;left:10%;right:10%;top:50%;height:2px;background:#60A0D8;box-shadow:0 -6px 0 rgba(96,160,216,0.55),0 6px 0 rgba(96,160,216,0.55);pointer-events:none}
.fi.kind-window .fl{position:absolute;left:50%;bottom:-20px;transform:translateX(-50%);padding:2px 6px;border-radius:5px;background:#0A0908;color:#83BCE6;font-size:10px;white-space:nowrap;border:1px solid rgba(96,160,216,0.25)}

@media (max-width: 980px), (pointer: coarse){
  #topbar{min-height:58px;gap:8px;flex-wrap:wrap}
  .project-name{width:100%;max-width:none;font-size:15px;min-height:40px}
  .topbar-left{flex:1 1 100%;order:1}.topbar-right{order:2;width:100%;justify-content:space-between}.tbtn{min-height:42px;flex:1}.icon-only{flex:0 0 46px;width:46px}
  .studio-sub{margin-left:auto}
  #body{display:flex;flex-direction:column;min-height:0}
  #cw{flex:1;min-height:0;order:1;position:relative;overflow:auto}
  #zoombar{position:absolute;top:8px;left:8px;margin:0;border-radius:14px;opacity:.96}.zbtn{min-width:40px;height:36px}#zoom-label{min-width:46px}.edit-zbtn{min-width:128px;height:54px;font-size:16px;border-radius:14px}
  #canvas-shell{margin:0}
  #sb{order:2;width:100%;height:clamp(104px,18dvh,136px);border-right:0;border-top:1px solid var(--bd);display:flex;align-items:stretch;gap:8px;overflow-x:auto;overflow-y:hidden;padding:8px max(10px,env(safe-area-inset-right)) calc(8px + env(safe-area-inset-bottom)) max(10px,env(safe-area-inset-left));scroll-snap-type:x proximity}
  .help-note{display:none}.cat-head{display:flex;align-items:center;justify-content:center;min-width:86px;height:100%;padding:8px 10px;margin:0;border:1px solid var(--bd);border-radius:12px;background:rgba(255,255,255,.025);font-size:10px;writing-mode:vertical-rl;text-orientation:mixed;color:var(--gold)}
  .pi{min-width:142px;max-width:150px;height:100%;min-height:0;margin:0;flex-direction:column;justify-content:center;text-align:center;padding:10px;scroll-snap-align:start;font-size:12px;background:rgba(255,255,255,.035);border-color:var(--bd);gap:8px}
  .pi .tap-add{margin-left:0;font-size:18px;opacity:1}.pd{width:16px;height:16px;border-radius:5px}
  #pp{position:fixed;left:0;right:0;bottom:0;width:100%;height:min(58dvh,430px);z-index:40;border-left:0;border-top:1px solid var(--bd2);border-radius:18px 18px 0 0;box-shadow:var(--shadow);transform:translateY(105%);transition:transform .22s ease;background:rgba(19,17,16,.98);padding-bottom:env(safe-area-inset-bottom)}
  body.props-open #pp{transform:translateY(0)}
  .sheet-close{display:block}.mobile-tip{display:block}.pp-top{padding:12px 16px}.pph{font-size:11px}#pb{padding:14px 16px 22px}
  .fi{font-size:12px}.rh{width:26px;height:26px;bottom:-12px;right:-12px;border-radius:8px}
}

@media (max-width:520px){
  .studio-icon{display:none}.studio-sub{font-size:11px}.topbar-right{gap:6px}.tbtn{font-size:12px;padding:8px 8px}.tbtn span.label{display:none}.icon-only{flex:0 0 42px;width:42px}
  #sb{height:clamp(92px,16dvh,116px)}.cat-head{min-width:48px}.pi{min-width:112px;max-width:120px;font-size:11px;padding:8px}.pi .tap-add{font-size:16px}
  #pp{height:62dvh}.project-name{font-size:14px}
}

@media print{
  @page{size:landscape;margin:10mm}
  *{-webkit-print-color-adjust:exact;print-color-adjust:exact}
  html,body{width:auto;height:auto;overflow:visible!important;background:#fff!important}
  #app{width:100%!important;height:auto!important;min-height:0!important;overflow:visible!important;background:#fff!important;color:#111!important;border:0!important}
  #topbar{height:42px!important;min-height:42px!important;padding:0 0 8px 0!important;background:#fff!important;border-bottom:1px solid #ddd!important;color:#111!important;display:flex!important}
  .studio-icon,.studio-sub,.topbar-right,#sb,#pp,#dl,#zoombar{display:none!important}
  .topbar-left{gap:0!important;width:100%!important;flex:1!important}
  #project-name{width:100%!important;max-width:none!important;border:0!important;background:transparent!important;color:#111!important;font-size:18px!important;font-weight:800!important;padding:0!important}
  #body{display:block!important;overflow:visible!important;height:auto!important}
  #cw{display:block!important;overflow:visible!important;background:#fff!important;width:100%!important;height:auto!important}
  #canvas-shell{width:960px!important;height:720px!important;margin:0 auto!important;overflow:visible!important}
  #cv{transform:none!important;width:960px!important;height:720px!important;background-color:#fff!important;border:1px solid #d5c29b!important;box-shadow:none!important}
  #cv::after{border:1px solid rgba(120,85,35,0.45)!important}
  .fi{box-shadow:none!important}.fi.sel{outline:none!important;filter:none!important}.rh{display:none!important}
}
</style>
</head>
<body>
<div id="app">
  <div id="topbar">
    <div class="topbar-left">
      <div class="studio-icon" aria-hidden="true">◆</div>
      <input class="project-name" id="project-name" value="Project Name" aria-label="Project name" spellcheck="false">
      <div class="studio-sub" id="item-count">0 items</div>
    </div>
    <div class="topbar-right">
      <button class="tbtn" onclick="exportPDF()" title="Export PDF"><span aria-hidden="true">PDF</span><span class="label">Export</span></button>
      <button class="tbtn primary" id="svb" onclick="saveLayout()" title="Save"><span aria-hidden="true">💾</span><span class="label">Save</span></button>
      <button class="tbtn danger icon-only" onclick="clearAll()" aria-label="Clear all" title="Clear all">🗑</button>
    </div>
  </div>

  <div id="body">
    <div id="sb"></div>
    <div id="cw">
      <div id="zoombar" aria-label="Canvas zoom controls">
        <button class="zbtn" onclick="setZoom(zoom-.1)" title="Zoom out">−</button>
        <button class="zbtn" onclick="fitZoom()" title="Fit to screen">Fit</button>
        <div id="zoom-label">100%</div>
        <button class="zbtn" onclick="setZoom(zoom+.1)" title="Zoom in">+</button>
        <button type="button" class="zbtn edit-zbtn" id="edit-selected" title="Edit selected item" disabled>Edit</button>
      </div>
      <div id="canvas-shell">
        <div id="cv">
          <div id="dl">24 ft × 18 ft · each square = 1 ft</div>
        </div>
      </div>
    </div>
    <div id="pp">
      <div class="pp-top"><div class="pph">Properties</div><button class="sheet-close" onclick="closeProperties()" aria-label="Close properties">×</button></div>
      <div id="pb"><div class="ns">Tap an item to select it<br>then press Edit<div class="mobile-tip">On iPad/phone: moving items will no longer open this panel.</div></div></div>
    </div>
  </div>
</div>

<script>
const SN=40,CW=960,CH=720,STORE_KEY='jsl-dark-v1';
let zoom=1,items=[],sel=null,uid=1,drag=null;
const CATS=[
  {name:'Layout',bg:'#2A2114',fg:'#E0A84A',dot:'#E0A84A',types:[
    {t:'zone',n:'Zone Label',w:5,h:2},{t:'zone',n:'Work Zone',w:6,h:4},
    {t:'zone',n:'Finishing Zone',w:5,h:3},{t:'zone',n:'Storage Zone',w:5,h:3},
    {t:'door',n:'Door',w:3,h:1},{t:'window',n:'Window',w:4,h:1}]},
  {name:'Workstations',bg:'#4C3210',fg:'#E8B870',dot:'#C8923A',types:[
    {t:'bench',n:"Jeweler's Bench",w:3,h:2},{t:'torch',n:'Torch Station',w:2,h:2},
    {t:'flex',n:'Flex Shaft',w:2,h:2},{t:'wax',n:'Wax Station',w:2,h:2}]},
  {name:'Finishing',bg:'#3E1E10',fg:'#E8A080',dot:'#B86040',types:[
    {t:'polish',n:'Polishing Wheel',w:2,h:2},{t:'ultra',n:'Ultrasonic',w:1,h:1},
    {t:'pickle',n:'Pickle Pot',w:1,h:1},{t:'tumbler',n:'Tumbler',w:1,h:1}]},
  {name:'Storage',bg:'#0C3228',fg:'#60C8A0',dot:'#1D9E75',types:[
    {t:'cabinet',n:'Storage Cabinet',w:2,h:2},{t:'chest',n:'Tool Chest',w:2,h:1},
    {t:'safe',n:'Safe',w:1,h:1},{t:'shelf',n:'Shelving Unit',w:3,h:1}]},
  {name:'Display',bg:'#0C1E3A',fg:'#60A0D8',dot:'#378ADD',types:[
    {t:'dcase',n:'Display Case',w:3,h:1},{t:'counter',n:'Display Counter',w:4,h:2},
    {t:'show',n:'Showcase',w:2,h:2}]},
  {name:'Utilities',bg:'#1E1E28',fg:'#9090B8',dot:'#5F5E8A',types:[
    {t:'sink',n:'Sink',w:2,h:1},{t:'desk',n:'Desk',w:3,h:2},
    {t:'stool',n:'Stool',w:1,h:1},{t:'mill',n:'Rolling Mill',w:2,h:2},
    {t:'cast',n:'Casting Area',w:3,h:2},{t:'wall',n:'Wall',w:5,h:1}]}
];
const ITEM_COLORS=[
  {bg:'#4C3210',fg:'#E8B870'},{bg:'#3E1E10',fg:'#E8A080'},
  {bg:'#0C3228',fg:'#60C8A0'},{bg:'#0C1E3A',fg:'#60A0D8'},
  {bg:'#1E1E28',fg:'#9090B8'},{bg:'#2E1A2E',fg:'#C090C0'},
  {bg:'#0E2E1E',fg:'#50C880'},{bg:'#1E2E0E',fg:'#90B850'},
  {bg:'#2A1010',fg:'#D07070'},{bg:'#282018',fg:'#C0A868'}
];
const cv=document.getElementById('cv'),cw=document.getElementById('cw'),shell=document.getElementById('canvas-shell');
const sb=document.getElementById('sb'),pb=document.getElementById('pb'),dl=document.getElementById('dl'),projectInput=document.getElementById('project-name'),editBtn=document.getElementById('edit-selected');

function esc(s){return String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/"/g,'&quot;');}
function sg(v,mn,mx){return Math.max(mn,Math.min(Math.round(v/SN)*SN,mx));}
function projectName(){return (projectInput&&projectInput.value.trim())||'Project Name';}
function setProjectName(v){if(projectInput)projectInput.value=(v&&String(v).trim())||'Project Name';}
function kindClass(type){return type==='zone'?' kind-zone':type==='door'?' kind-door':type==='window'?' kind-window':'';}
function storeAvailable(){return window.storage&&typeof window.storage.get==='function'&&typeof window.storage.set==='function';}
async function readStore(key){if(storeAvailable())return await window.storage.get(key);const value=localStorage.getItem(key);return value?{value}:null;}
async function writeStore(key,value){if(storeAvailable())return await window.storage.set(key,value);localStorage.setItem(key,value);}
function clamp(n,min,max){return Math.max(min,Math.min(n,max));}
function isTouchLayout(){return window.matchMedia('(max-width: 980px), (pointer: coarse)').matches;}
let fitMode=true;
function canvasViewport(){
  const edge=isTouchLayout()?10:24;
  return {
    edge,
    w:Math.max(1,cw.clientWidth-edge*2),
    h:Math.max(1,cw.clientHeight-edge*2)
  };
}
function updateCanvasMargins(){
  const v=canvasViewport();
  const sw=CW*zoom, sh=CH*zoom;
  if(isTouchLayout()){
    const left=Math.max(v.edge,Math.floor((cw.clientWidth-sw)/2));
    const top=Math.max(v.edge,Math.floor((cw.clientHeight-sh)/2));
    const right=Math.max(v.edge,Math.floor((cw.clientWidth-sw-left)));
    const bottom=Math.max(v.edge,Math.floor((cw.clientHeight-sh-top)));
    shell.style.margin=`${top}px ${right}px ${bottom}px ${left}px`;
  }else{
    shell.style.margin='12px 12px 28px 12px';
  }
}
function applyZoom(center=true){
  zoom=clamp(Math.round(zoom*1000)/1000,.1,1.6);
  cv.style.transform=`scale(${zoom})`;
  shell.style.width=(CW*zoom)+'px';
  shell.style.height=(CH*zoom)+'px';
  updateCanvasMargins();
  document.getElementById('zoom-label').textContent=Math.round(zoom*100)+'%';
  if(center&&isTouchLayout()){
    requestAnimationFrame(()=>{
      const maxX=Math.max(0,cw.scrollWidth-cw.clientWidth);
      const maxY=Math.max(0,cw.scrollHeight-cw.clientHeight);
      cw.scrollTo({left:maxX/2,top:maxY/2,behavior:'auto'});
    });
  }
}
function setZoom(v){fitMode=false;zoom=v;applyZoom(true);}
function fitZoom(){
  fitMode=true;
  const v=canvasViewport();
  zoom=clamp(Math.min(v.w/CW,v.h/CH),.1,isTouchLayout()?1.15:1);
  applyZoom(true);
}
function refitCanvas(){
  if(isTouchLayout()||fitMode)fitZoom();
  else applyZoom(false);
}
function initZoom(){fitZoom();}
function updateDimensionLabel(){dl.textContent='24 ft × 18 ft · each square = 1 ft';}
function localPoint(e){const r=cv.getBoundingClientRect();return {x:(e.clientX-r.left)/zoom,y:(e.clientY-r.top)/zoom};}
function centerPlacement(w,h){
  const cr=cw.getBoundingClientRect();
  const sr=shell.getBoundingClientRect();
  const viewCenterX=(cr.left+cr.right)/2;
  const viewCenterY=(cr.top+cr.bottom)/2;
  const x=sg((viewCenterX-sr.left)/zoom-w/2,0,CW-w);
  const y=sg((viewCenterY-sr.top)/zoom-h/2,0,CH-h);
  return {x,y};
}

if(projectInput){projectInput.addEventListener('input',autoSave);projectInput.addEventListener('keydown',e=>{if(e.key==='Enter')projectInput.blur();});}
function scheduleRefit(delay=80){
  clearTimeout(window.__fitTimer);
  window.__fitTimer=setTimeout(refitCanvas,delay);
}
window.addEventListener('resize',()=>scheduleRefit(80));
if(window.visualViewport){window.visualViewport.addEventListener('resize',()=>scheduleRefit(80));}
window.addEventListener('orientationchange',()=>scheduleRefit(260));
if('ResizeObserver' in window){new ResizeObserver(()=>scheduleRefit(40)).observe(cw);}
updateDimensionLabel();applyZoom(false);

sb.innerHTML='<div class="help-note">Desktop: drag equipment onto the plan.<br>iPad/phone: tap equipment to add it. Tap an item to select it, then press Edit when needed.</div>';
CATS.forEach(cat=>{
  const h=document.createElement('div');h.className='cat-head';h.textContent=cat.name;sb.appendChild(h);
  cat.types.forEach(t=>{
    const el=document.createElement('div');el.className='pi';el.draggable=true;el.role='button';el.tabIndex=0;
    el.innerHTML=`<span class="pd" style="background:${cat.dot}"></span><span>${t.n}</span><span class="tap-add">＋</span>`;
    const p={bg:cat.bg,fg:cat.fg,t:t.t,n:t.n,w:t.w*SN,h:t.h*SN};
    el.addEventListener('dragstart',e=>e.dataTransfer.setData('text/plain',JSON.stringify(p)));
    el.addEventListener('click',()=>addFromPalette(p));
    el.addEventListener('keydown',e=>{if(e.key==='Enter'||e.key===' '){e.preventDefault();addFromPalette(p);}});
    sb.appendChild(el);
  });
});
function addFromPalette(p){const pos=centerPlacement(p.w,p.h);addItem({...p,...pos});}

cv.addEventListener('dragover',e=>e.preventDefault());
cv.addEventListener('drop',e=>{
  e.preventDefault();
  const raw=e.dataTransfer.getData('text/plain')||e.dataTransfer.getData('text');
  if(!raw)return;
  const d=JSON.parse(raw);const p=localPoint(e);
  const x=sg(p.x-d.w/2,0,CW-d.w);const y=sg(p.y-d.h/2,0,CH-d.h);
  addItem({...d,x,y});
});
cv.addEventListener('pointerdown',e=>{if(e.target===cv||e.target===dl)selectItem(null);});

function addItem(d){
  const item={id:uid++,type:d.t,name:d.n,x:d.x,y:d.y,w:d.w,h:d.h,bg:d.bg,fg:d.fg};
  items.push(item);mkEl(item);selectItem(item.id,{openSheet:!isTouchLayout()});updateCount();autoSave();
}
function mkEl(item){
  const el=document.createElement('div');
  el.className='fi'+kindClass(item.type);el.dataset.type=item.type||'';el.id='fi'+item.id;
  el.style.cssText=`left:${item.x}px;top:${item.y}px;width:${item.w}px;height:${item.h}px;background:${item.bg};color:${item.fg}`;
  el.innerHTML=`<span class="fl">${esc(item.name)}</span><div class="rh" aria-hidden="true"></div>`;
  el.querySelector('.rh').addEventListener('pointerdown',e=>{e.stopPropagation();startResize(e,item.id);});
  el.addEventListener('pointerdown',e=>{if(e.target.classList.contains('rh'))return;e.stopPropagation();startMove(e,item.id);});
  cv.appendChild(el);
}
function gi(id){return items.find(i=>i.id===id);}function ge(id){return document.getElementById('fi'+id);}
function updateCount(){const el=document.getElementById('item-count');if(el)el.textContent=items.length===0?'empty':items.length+' item'+(items.length===1?'':'s');}
function updateEditButton(){
  if(!editBtn)return;
  const isOpen=document.body.classList.contains('props-open');
  editBtn.disabled=sel===null;
  editBtn.textContent=isOpen?'Close':'Edit';
  editBtn.title=isOpen?'Close edit mode':'Edit selected item';
  editBtn.classList.toggle('is-open',isOpen);
}
function closeProperties(){
  document.body.classList.remove('props-open');
  updateEditButton();
}
function openProperties(id=sel){
  if(id===null)return;
  renderProps(id);
  document.body.classList.add('props-open');
  updateEditButton();
}
function toggleProperties(id=sel){
  if(id===null)return;
  if(document.body.classList.contains('props-open'))closeProperties();
  else openProperties(id);
}
let editTapLock=0;
function handleEditButtonTap(e){
  if(e){e.preventDefault();e.stopPropagation();}
  if(!editBtn||editBtn.disabled||sel===null)return;
  const now=Date.now();
  if(now-editTapLock<320)return;
  editTapLock=now;
  toggleProperties(sel);
}
if(editBtn){
  editBtn.addEventListener('pointerdown',e=>{e.stopPropagation();});
  editBtn.addEventListener('touchend',handleEditButtonTap,{passive:false});
  editBtn.addEventListener('click',handleEditButtonTap);
}
function selectItem(id,opts={}){
  if(sel!==null){const p=ge(sel);if(p)p.classList.remove('sel');}
  sel=id;
  document.body.classList.toggle('has-selection',id!==null);
  if(id!==null){
    const el=ge(id);if(el)el.classList.add('sel');
    renderProps(id);
    if(opts.openSheet||!isTouchLayout())openProperties(id);else closeProperties();
  }else{
    closeProperties();
    pb.innerHTML='<div class="ns">Tap an item to select it<br>then press Edit<div class="mobile-tip">On iPad/phone: moving items will no longer open this panel.</div></div>';
  }
  updateEditButton();
}
function renderProps(id){
  const it=gi(id);if(!it)return;
  const swatches=ITEM_COLORS.map((c,i)=>`<button class="csw${it.bg===c.bg?' active':''}" style="background:${c.bg};border-color:${it.bg===c.bg?'#C8923A':'transparent'}" onclick="changeColor(${id},${i})" aria-label="Color ${i+1}"></button>`).join('');
  pb.innerHTML=`
    <div class="ppl">Name</div><input class="ppi" id="pn" value="${esc(it.name)}">
    <div class="ppl">Color</div><div class="color-row">${swatches}</div>
    <div class="divider"></div>
    <div class="ppl">Width (ft)</div><input class="ppi" id="pw" type="number" min="1" max="24" step="1" value="${Math.round(it.w/SN)}">
    <div class="ppl">Depth (ft)</div><input class="ppi" id="ph" type="number" min="1" max="18" step="1" value="${Math.round(it.h/SN)}">
    <div class="stat-row"><span>Area</span><span class="stat-val">${Math.round(it.w/SN)*Math.round(it.h/SN)} ft²</span></div>
    <div class="ppl">Move by 1 ft</div>
    <div class="nudge-grid"><button onclick="nudge(${id},0,-1)">↑</button><button onclick="nudge(${id},-1,0)">←</button><button onclick="nudge(${id},1,0)">→</button><button onclick="nudge(${id},0,1)">↓</button></div>
    <button class="dbt" onclick="delItem(${id})">🗑 Remove</button>`;
  document.getElementById('pn').addEventListener('input',e=>{it.name=e.target.value;const el=ge(id);if(el)el.querySelector('.fl').textContent=it.name;autoSave();});
  document.getElementById('pw').addEventListener('change',e=>{it.w=Math.max(SN,Math.min(parseInt(e.target.value)||1,24)*SN);it.x=Math.min(it.x,CW-it.w);const el=ge(id);if(el){el.style.width=it.w+'px';el.style.left=it.x+'px';}renderProps(id);autoSave();});
  document.getElementById('ph').addEventListener('change',e=>{it.h=Math.max(SN,Math.min(parseInt(e.target.value)||1,18)*SN);it.y=Math.min(it.y,CH-it.h);const el=ge(id);if(el){el.style.height=it.h+'px';el.style.top=it.y+'px';}renderProps(id);autoSave();});
}
function changeColor(id,ci){const it=gi(id);if(!it)return;const c=ITEM_COLORS[ci];it.bg=c.bg;it.fg=c.fg;const el=ge(id);if(el){el.style.background=it.bg;el.style.color=it.fg;}renderProps(id);autoSave();}
function nudge(id,dx,dy){const it=gi(id),el=ge(id);if(!it||!el)return;it.x=clamp(it.x+dx*SN,0,CW-it.w);it.y=clamp(it.y+dy*SN,0,CH-it.h);el.style.left=it.x+'px';el.style.top=it.y+'px';autoSave();}
function delItem(id){items=items.filter(i=>i.id!==id);const el=ge(id);if(el)el.remove();selectItem(null);updateCount();autoSave();}
function startMove(e,id){
  selectItem(id,{openSheet:false});const it=gi(id),el=ge(id),p=localPoint(e);if(!it||!el)return;
  drag={type:'m',id,it,el,pid:e.pointerId,ox:p.x-it.x,oy:p.y-it.y};
  try{el.setPointerCapture(e.pointerId);}catch(_e){}
  e.preventDefault();
}
function startResize(e,id){
  selectItem(id,{openSheet:false});const it=gi(id),el=ge(id),p=localPoint(e);if(!it||!el)return;
  drag={type:'r',id,it,el,pid:e.pointerId,sx:p.x,sy:p.y,sw:it.w,sh:it.h};
  try{el.setPointerCapture(e.pointerId);}catch(_e){}
  e.preventDefault();
}
document.addEventListener('pointermove',e=>{
  if(!drag||e.pointerId!==drag.pid)return;
  const p=localPoint(e);
  if(drag.type==='m'){
    drag.it.x=sg(p.x-drag.ox,0,CW-drag.it.w);drag.it.y=sg(p.y-drag.oy,0,CH-drag.it.h);
    drag.el.style.left=drag.it.x+'px';drag.el.style.top=drag.it.y+'px';
  }else{
    const w=Math.max(SN,Math.round((drag.sw+p.x-drag.sx)/SN)*SN);
    const h=Math.max(SN,Math.round((drag.sh+p.y-drag.sy)/SN)*SN);
    drag.it.w=Math.min(w,CW-drag.it.x);drag.it.h=Math.min(h,CH-drag.it.y);
    drag.el.style.width=drag.it.w+'px';drag.el.style.height=drag.it.h+'px';
  }
  e.preventDefault();
},{passive:false});
document.addEventListener('pointerup',endPointerDrag);document.addEventListener('pointercancel',endPointerDrag);
function endPointerDrag(e){if(!drag||e.pointerId!==drag.pid)return;if(drag.type==='r'&&document.body.classList.contains('props-open'))renderProps(drag.id);autoSave();drag=null;}
function clearAll(){if(!items.length)return;items=[];document.querySelectorAll('.fi').forEach(el=>el.remove());selectItem(null);updateCount();autoSave();}
let st=null;function autoSave(){clearTimeout(st);st=setTimeout(saveLayout,500);}
async function saveLayout(){
  try{
    await writeStore(STORE_KEY,JSON.stringify({items,uid,projectName:projectName()}));
    const b=document.getElementById('svb');if(b){const orig=b.innerHTML;b.classList.add('ok');b.innerHTML='<span aria-hidden="true">✓</span><span class="label">Saved</span>';setTimeout(()=>{b.classList.remove('ok');b.innerHTML=orig;},1200);}
  }catch(e){console.warn('Save failed',e);}
}
function exportPDF(){selectItem(null);closeProperties();saveLayout();const oldTitle=document.title;document.title=projectName()+' - Studio Layout';setTimeout(()=>window.print(),100);setTimeout(()=>{document.title=oldTitle;},1200);}
async function init(){
  initZoom();
  try{const r=await readStore(STORE_KEY);if(r&&r.value){const d=JSON.parse(r.value);items=d.items||[];uid=d.uid||1;setProjectName(d.projectName);items.forEach(i=>mkEl(i));updateCount();}}
  catch(e){console.warn('Load failed',e);}
  try{const old=await readStore('jsl-v2');if(old&&old.value&&items.length===0){const d=JSON.parse(old.value);items=d.items||[];uid=d.uid||1;setProjectName(d.projectName);items.forEach(i=>mkEl(i));updateCount();}}
  catch(e){}
}
init();
</script>
</body>
</html>
