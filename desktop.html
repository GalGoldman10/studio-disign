
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;min-height:100%;overflow:hidden;background:#0D0C0B}
:root{
  --bg:#0D0C0B;--surface:#131110;--panel:#0F0E0D;--canvas-bg:#0A0908;
  --gold:#C8923A;--gold-dim:rgba(200,146,58,0.18);--gold-bright:#E0A84A;
  --text:#EDE6DC;--text2:#6A6058;--text3:#3A3530;
  --bd:rgba(255,255,255,0.07);--bd2:rgba(255,255,255,0.13);
  --red:rgba(180,60,60,0.9);--red-dim:rgba(180,60,60,0.15);
}
#app{display:flex;flex-direction:column;width:100vw;height:100vh;min-height:100vh;background:var(--bg);border-radius:0;overflow:hidden;border:0;font-family:var(--font-sans,Inter,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif)}

#topbar{
  display:flex;align-items:center;justify-content:space-between;
  padding:0 16px;height:44px;background:var(--panel);
  border-bottom:1px solid var(--bd);flex-shrink:0
}
.topbar-left{display:flex;align-items:center;gap:10px;min-width:0}
.studio-icon{width:22px;height:22px;display:flex;align-items:center;justify-content:center;color:var(--gold);flex-shrink:0}
.project-name{width:240px;max-width:34vw;padding:5px 8px;border:1px solid transparent;border-radius:6px;background:rgba(255,255,255,0.035);color:var(--text);font-size:13px;font-weight:500;letter-spacing:.01em;outline:none;transition:all .15s}
.project-name:hover{border-color:var(--bd2);background:rgba(255,255,255,0.055)}
.project-name:focus{border-color:var(--gold);background:rgba(200,146,58,0.08);box-shadow:0 0 0 2px rgba(200,146,58,0.12)}
.project-name::placeholder{color:var(--text2)}
.studio-sub{font-size:11px;color:var(--text2);flex-shrink:0}
.topbar-right{display:flex;gap:6px}
.tbtn{display:flex;align-items:center;gap:5px;padding:5px 11px;font-size:12px;border-radius:6px;cursor:pointer;border:1px solid var(--bd2);background:transparent;color:var(--text2);transition:all .15s}
.tbtn:hover{background:rgba(255,255,255,0.06);color:var(--text);border-color:rgba(255,255,255,0.2)}
.tbtn.primary{border-color:var(--gold);color:var(--gold)}
.tbtn.primary:hover{background:var(--gold-dim)}
.tbtn.ok{border-color:#3A6A3A;color:#5A9A5A}
.tbtn.danger{border-color:rgba(160,50,50,0.5);color:#A06060}
.tbtn.danger:hover{background:var(--red-dim)}

#body{display:flex;flex:1;overflow:hidden}

#sb{width:186px;background:var(--surface);border-right:1px solid var(--bd);overflow-y:auto;flex-shrink:0;padding:10px 8px 16px}
#sb::-webkit-scrollbar{width:3px}
#sb::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);border-radius:2px}
.cat-head{font-size:9.5px;font-weight:500;color:var(--text3);text-transform:uppercase;letter-spacing:.1em;padding:10px 4px 5px;margin-top:6px}
.cat-head:first-child{margin-top:0;padding-top:2px}
.pi{display:flex;align-items:center;gap:8px;padding:6px 8px;border-radius:6px;cursor:grab;font-size:12px;color:var(--text2);user-select:none;border:1px solid transparent;margin-bottom:1px;transition:all .12s}
.pi:hover{background:rgba(255,255,255,0.05);border-color:var(--bd2);color:var(--text)}
.pi:active{cursor:grabbing}
.pd{width:8px;height:8px;border-radius:2px;flex-shrink:0}

#cw{flex:1;overflow:auto;background:#080706}
#cw::-webkit-scrollbar{width:6px;height:6px}
#cw::-webkit-scrollbar-track{background:#080706}
#cw::-webkit-scrollbar-thumb{background:#222;border-radius:3px}
#cv{
  position:relative;width:100%;height:100%;min-width:960px;min-height:720px;
  background-color:var(--canvas-bg);
  background-image:
    linear-gradient(rgba(255,255,255,0.055) 1px,transparent 1px),
    linear-gradient(90deg,rgba(255,255,255,0.055) 1px,transparent 1px),
    linear-gradient(rgba(200,146,58,0.07) 1px,transparent 1px),
    linear-gradient(90deg,rgba(200,146,58,0.07) 1px,transparent 1px);
  background-size:40px 40px,40px 40px,200px 200px,200px 200px
}
#cv::after{content:'';position:absolute;inset:0;border:1px solid rgba(200,146,58,0.22);pointer-events:none;border-radius:1px}
#dl{position:absolute;bottom:10px;left:12px;font-size:10px;color:rgba(255,255,255,0.14);pointer-events:none;letter-spacing:.04em}

.fi{position:absolute;border-radius:5px;display:flex;align-items:center;justify-content:center;cursor:move;font-size:10.5px;font-weight:500;text-align:center;line-height:1.2;padding:3px;border:1px solid rgba(255,255,255,0.1);user-select:none;overflow:visible;transition:filter .12s}
.fi:hover{filter:brightness(1.15);z-index:10}
.fi.sel{outline:2px solid var(--gold);outline-offset:2px;z-index:20;filter:brightness(1.12)}
.fl{pointer-events:none;word-break:break-word;max-width:100%;padding:2px;overflow:hidden}
.rh{position:absolute;bottom:-5px;right:-5px;width:10px;height:10px;border-radius:2px;background:var(--gold);cursor:se-resize;z-index:5;border:none}

#pp{width:174px;background:var(--surface);border-left:1px solid var(--bd);flex-shrink:0;overflow-y:auto;display:flex;flex-direction:column}
#pp::-webkit-scrollbar{width:3px}
#pp::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);border-radius:2px}
.pp-top{padding:12px 14px;border-bottom:1px solid var(--bd);flex-shrink:0}
.pph{font-size:9.5px;font-weight:500;color:var(--text3);text-transform:uppercase;letter-spacing:.1em}
#pb{padding:12px;flex:1}
.ppl{font-size:11px;color:var(--text2);margin-bottom:4px;margin-top:12px}
.ppl:first-of-type{margin-top:0}
.ppi{width:100%;padding:6px 9px;font-size:12px;border:1px solid rgba(255,255,255,0.1);border-radius:6px;background:rgba(255,255,255,0.04);color:var(--text);outline:none;transition:border-color .15s}
.ppi:focus{border-color:var(--gold)}
.dbt{width:100%;margin-top:14px;padding:7px;border-radius:6px;border:1px solid rgba(160,60,60,0.4);background:transparent;color:#A06060;cursor:pointer;font-size:12px;display:flex;align-items:center;justify-content:center;gap:5px;transition:all .12s}
.dbt:hover{background:var(--red-dim);border-color:rgba(180,70,70,0.7);color:#C07070}
.ns{color:var(--text3);font-size:12px;text-align:center;margin-top:36px;line-height:1.8}
.color-row{display:flex;flex-wrap:wrap;gap:4px;margin-top:6px}
.csw{width:20px;height:20px;border-radius:4px;cursor:pointer;border:2px solid transparent;transition:transform .1s,border-color .1s}
.csw:hover{transform:scale(1.15)}
.csw.active{border-color:var(--gold-bright)}

.divider{height:1px;background:var(--bd);margin:12px 0}
.stat-row{display:flex;justify-content:space-between;font-size:11px;color:var(--text2);margin-top:6px}
.stat-val{color:var(--gold);font-weight:500}

.fi.kind-zone{background:rgba(200,146,58,0.055)!important;border:1px dashed rgba(200,146,58,0.62)!important;color:var(--gold-bright)!important;font-size:14px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;box-shadow:inset 0 0 0 999px rgba(200,146,58,0.02)}
.fi.kind-zone .fl{padding:5px 8px;background:rgba(10,9,8,0.58);border:1px solid rgba(200,146,58,0.18);border-radius:999px;max-width:calc(100% - 12px)}
.fi.kind-door{background:rgba(200,146,58,0.045)!important;border:2px solid var(--gold)!important;color:var(--gold-bright)!important;overflow:visible}
.fi.kind-door::before{content:'';position:absolute;left:2px;bottom:2px;width:calc(100% - 8px);height:calc(100% - 8px);border-top:2px solid rgba(224,168,74,0.82);border-right:2px solid rgba(224,168,74,0.82);border-radius:0 100% 0 0;pointer-events:none;opacity:.75}
.fi.kind-door .fl{position:absolute;left:50%;bottom:-18px;transform:translateX(-50%);padding:1px 5px;border-radius:4px;background:#0A0908;color:var(--gold-bright);font-size:9px;white-space:nowrap;border:1px solid rgba(200,146,58,0.25)}
.fi.kind-window{background:rgba(96,160,216,0.04)!important;border:2px solid #60A0D8!important;color:#83BCE6!important;overflow:visible}
.fi.kind-window::before{content:'';position:absolute;left:10%;right:10%;top:50%;height:2px;background:#60A0D8;box-shadow:0 -6px 0 rgba(96,160,216,0.55),0 6px 0 rgba(96,160,216,0.55);pointer-events:none}
.fi.kind-window .fl{position:absolute;left:50%;bottom:-18px;transform:translateX(-50%);padding:1px 5px;border-radius:4px;background:#0A0908;color:#83BCE6;font-size:9px;white-space:nowrap;border:1px solid rgba(96,160,216,0.25)}

@media print{
  @page{size:landscape;margin:10mm}
  *{-webkit-print-color-adjust:exact;print-color-adjust:exact}
  html,body{width:auto;height:auto;overflow:visible!important;background:#fff!important}
  #app{width:100%!important;height:auto!important;min-height:0!important;overflow:visible!important;background:#fff!important;color:#111!important;border:0!important}
  #topbar{height:42px!important;padding:0 0 8px 0!important;background:#fff!important;border-bottom:1px solid #ddd!important;color:#111!important}
  .studio-icon,.studio-sub,.topbar-right,#sb,#pp,#dl{display:none!important}
  .topbar-left{gap:0!important;width:100%!important}
  #project-name{width:100%!important;max-width:none!important;border:0!important;background:transparent!important;color:#111!important;font-size:18px!important;font-weight:700!important;padding:0!important}
  #body{display:block!important;overflow:visible!important;height:auto!important}
  #cw{display:block!important;overflow:visible!important;background:#fff!important;width:100%!important;height:auto!important}
  #cv{width:100%!important;min-width:0!important;height:calc(100vh - 70px)!important;min-height:0!important;background-color:#fff!important;border:1px solid #d5c29b!important;page-break-inside:avoid!important}
  #cv::after{border:1px solid rgba(120,85,35,0.45)!important}
  .fi{box-shadow:none!important}
  .fi.sel{outline:none!important;filter:none!important}
  .rh{display:none!important}
}

</style>

<div id="app">
  <div id="topbar">
    <div class="topbar-left">
      <div class="studio-icon"><i class="ti ti-diamond" style="font-size:16px" aria-hidden="true"></i></div>
      <input class="project-name" id="project-name" value="Project Name" aria-label="Project name" spellcheck="false">
      <div class="studio-sub" id="item-count">0 items</div>
    </div>
    <div class="topbar-right">
      <button class="tbtn" onclick="exportPDF()"><i class="ti ti-file-type-pdf" style="font-size:13px" aria-hidden="true"></i> PDF</button>
      <button class="tbtn primary" id="svb" onclick="saveLayout()"><i class="ti ti-device-floppy" style="font-size:13px" aria-hidden="true"></i> Save</button>
      <button class="tbtn danger" onclick="clearAll()" aria-label="Clear all"><i class="ti ti-trash" style="font-size:13px" aria-hidden="true"></i></button>
    </div>
  </div>

  <div id="body">
    <div id="sb"></div>
    <div id="cw">
      <div id="cv">
        <div id="dl">24 ft × 18 ft · each square = 1 ft</div>
      </div>
    </div>
    <div id="pp">
      <div class="pp-top"><div class="pph">Properties</div></div>
      <div id="pb"><div class="ns">Drag from the<br>palette onto<br>the floor plan.<br><br>Click any item<br>to edit it.</div></div>
    </div>
  </div>
</div>

<script>
const SN=40,MIN_CW=960,MIN_CH=720,STORE_KEY='jsl-dark-v1';
let CW=MIN_CW,CH=MIN_CH;
const CATS=[
  {name:'Layout',bg:'#2A2114',fg:'#E0A84A',dot:'#E0A84A',types:[
    {t:'zone',n:'Zone Label',w:5,h:2},{t:'zone',n:'Work Zone',w:6,h:4},
    {t:'zone',n:'Finishing Zone',w:5,h:3},{t:'zone',n:'Storage Zone',w:5,h:3},
    {t:'door',n:'Door',w:3,h:1},{t:'window',n:'Window',w:4,h:1}]},
  {name:'Workstations',bg:'#4C3210',fg:'#E8B870',dot:'#C8923A',types:[
    {t:'bench',n:"Jeweler's Bench",w:3,h:2},{t:'torch',n:'Torch Station',w:2,h:2},
    {t:'flex',n:'Flex Shaft',w:2,h:2},{t:'wax',n:'Wax Station',w:2,h:2}]},
  {name:'Finishing',bg:'#3E1E10',fg:'#E8A080',dot:'#B86040',types:[
    {t:'polish',n:'Polishing Wheel',w:2,h:2},{t:'ultra',n:'Ultrasonic',w:1,h:1},
    {t:'pickle',n:'Pickle Pot',w:1,h:1},{t:'tumbler',n:'Tumbler',w:1,h:1}]},
  {name:'Storage',bg:'#0C3228',fg:'#60C8A0',dot:'#1D9E75',types:[
    {t:'cabinet',n:'Storage Cabinet',w:2,h:2},{t:'chest',n:'Tool Chest',w:2,h:1},
    {t:'safe',n:'Safe',w:1,h:1},{t:'shelf',n:'Shelving Unit',w:3,h:1}]},
  {name:'Display',bg:'#0C1E3A',fg:'#60A0D8',dot:'#378ADD',types:[
    {t:'dcase',n:'Display Case',w:3,h:1},{t:'counter',n:'Display Counter',w:4,h:2},
    {t:'show',n:'Showcase',w:2,h:2}]},
  {name:'Utilities',bg:'#1E1E28',fg:'#9090B8',dot:'#5F5E8A',types:[
    {t:'sink',n:'Sink',w:2,h:1},{t:'desk',n:'Desk',w:3,h:2},
    {t:'stool',n:'Stool',w:1,h:1},{t:'mill',n:'Rolling Mill',w:2,h:2},
    {t:'cast',n:'Casting Area',w:3,h:2},{t:'wall',n:'Wall',w:5,h:1}]}
];

const ITEM_COLORS=[
  {bg:'#4C3210',fg:'#E8B870'},{bg:'#3E1E10',fg:'#E8A080'},
  {bg:'#0C3228',fg:'#60C8A0'},{bg:'#0C1E3A',fg:'#60A0D8'},
  {bg:'#1E1E28',fg:'#9090B8'},{bg:'#2E1A2E',fg:'#C090C0'},
  {bg:'#0E2E1E',fg:'#50C880'},{bg:'#1E2E0E',fg:'#90B850'},
  {bg:'#2A1010',fg:'#D07070'},{bg:'#282018',fg:'#C0A868'}
];

let items=[],sel=null,uid=1,drag=null;
const cv=document.getElementById('cv');
const cw=document.getElementById('cw');
const sb=document.getElementById('sb');
const pb=document.getElementById('pb');
const dl=document.getElementById('dl');
const projectInput=document.getElementById('project-name');

function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/"/g,'&quot;');}
function sg(v,mn,mx){return Math.max(mn,Math.min(Math.round(v/SN)*SN,mx));}
function projectName(){return (projectInput&&projectInput.value.trim())||'Project Name';}
function setProjectName(v){if(projectInput)projectInput.value=(v&&String(v).trim())||'Project Name';}
function kindClass(type){return type==='zone'?' kind-zone':type==='door'?' kind-door':type==='window'?' kind-window':'';}
function storeAvailable(){return window.storage&&typeof window.storage.get==='function'&&typeof window.storage.set==='function';}
async function readStore(key){
  if(storeAvailable())return await window.storage.get(key);
  const value=localStorage.getItem(key);
  return value?{value}:null;
}
async function writeStore(key,value){
  if(storeAvailable())return await window.storage.set(key,value);
  localStorage.setItem(key,value);
}
function updateDimensionLabel(){
  if(dl)dl.textContent=Math.round(CW/SN)+' ft × '+Math.round(CH/SN)+' ft · each square = 1 ft';
}
function clampItemsToCanvas(){
  items.forEach(it=>{
    it.x=Math.max(0,Math.min(it.x,CW-it.w));
    it.y=Math.max(0,Math.min(it.y,CH-it.h));
    const el=ge(it.id);
    if(el){el.style.left=it.x+'px';el.style.top=it.y+'px';}
  });
}
function updateCanvasSize(){
  const w=Math.max(MIN_CW,Math.floor(cw.clientWidth/SN)*SN);
  const h=Math.max(MIN_CH,Math.floor(cw.clientHeight/SN)*SN);
  CW=w;CH=h;
  cv.style.width=CW+'px';
  cv.style.height=CH+'px';
  updateDimensionLabel();
  clampItemsToCanvas();
}
if(projectInput){
  projectInput.addEventListener('input',autoSave);
  projectInput.addEventListener('keydown',e=>{if(e.key==='Enter')projectInput.blur();});
}
window.addEventListener('resize',()=>{updateCanvasSize();autoSave();});
updateCanvasSize();

CATS.forEach(cat=>{
  const h=document.createElement('div');h.className='cat-head';h.textContent=cat.name;sb.appendChild(h);
  cat.types.forEach(t=>{
    const el=document.createElement('div');el.className='pi';el.draggable=true;
    el.innerHTML=`<span class="pd" style="background:${cat.dot}"></span><span>${t.n}</span>`;
    const p={bg:cat.bg,fg:cat.fg,t:t.t,n:t.n,w:t.w*SN,h:t.h*SN};
    el.addEventListener('dragstart',e=>e.dataTransfer.setData('text',JSON.stringify(p)));
    sb.appendChild(el);
  });
});

cv.addEventListener('dragover',e=>e.preventDefault());
cv.addEventListener('drop',e=>{
  e.preventDefault();
  const d=JSON.parse(e.dataTransfer.getData('text'));
  const r=cv.getBoundingClientRect();
  const x=sg(e.clientX-r.left-d.w/2,0,CW-d.w);
  const y=sg(e.clientY-r.top-d.h/2,0,CH-d.h);
  addItem({...d,x,y});
});

function addItem(d){
  const item={id:uid++,type:d.t,name:d.n,x:d.x,y:d.y,w:d.w,h:d.h,bg:d.bg,fg:d.fg};
  items.push(item);mkEl(item);selectItem(item.id);updateCount();autoSave();
}

function mkEl(item){
  const el=document.createElement('div');
  el.className='fi'+kindClass(item.type);el.dataset.type=item.type||'';el.id='fi'+item.id;
  el.style.cssText=`left:${item.x}px;top:${item.y}px;width:${item.w}px;height:${item.h}px;background:${item.bg};color:${item.fg}`;
  el.innerHTML=`<span class="fl">${esc(item.name)}</span><div class="rh"></div>`;
  el.querySelector('.rh').addEventListener('mousedown',e=>{e.stopPropagation();startResize(e,item.id);});
  el.addEventListener('mousedown',e=>{if(e.target.classList.contains('rh'))return;e.stopPropagation();startMove(e,item.id);});
  cv.appendChild(el);
}

function gi(id){return items.find(i=>i.id===id);}
function ge(id){return document.getElementById('fi'+id);}

function updateCount(){
  const el=document.getElementById('item-count');
  if(el)el.textContent=items.length===0?'empty':items.length+' item'+(items.length===1?'':'s');
}

function selectItem(id){
  if(sel!==null){const p=ge(sel);if(p)p.classList.remove('sel');}
  sel=id;
  if(id!==null){const el=ge(id);if(el)el.classList.add('sel');renderProps(id);}
  else pb.innerHTML='<div class="ns">Click an item<br>to edit it</div>';
}

function renderProps(id){
  const it=gi(id);if(!it)return;
  const swatches=ITEM_COLORS.map((c,i)=>`<div class="csw${it.bg===c.bg?' active':''}" style="background:${c.bg};border:2px solid ${it.bg===c.bg?'#C8923A':'transparent'}" onclick="changeColor(${id},${i})"></div>`).join('');
  const maxW=Math.max(1,Math.round(CW/SN));
  const maxH=Math.max(1,Math.round(CH/SN));
  pb.innerHTML=`
    <div class="ppl">Name</div>
    <input class="ppi" id="pn" value="${esc(it.name)}">
    <div class="ppl">Color</div>
    <div class="color-row">${swatches}</div>
    <div class="divider"></div>
    <div class="ppl">Width (ft)</div>
    <input class="ppi" id="pw" type="number" min="1" max="${maxW}" step="1" value="${Math.round(it.w/SN)}">
    <div class="ppl">Depth (ft)</div>
    <input class="ppi" id="ph" type="number" min="1" max="${maxH}" step="1" value="${Math.round(it.h/SN)}">
    <div class="stat-row"><span>Area</span><span class="stat-val">${Math.round(it.w/SN)*Math.round(it.h/SN)} ft²</span></div>
    <button class="dbt" onclick="delItem(${id})"><i class="ti ti-trash" style="font-size:12px" aria-hidden="true"></i> Remove</button>
  `;
  document.getElementById('pn').addEventListener('input',e=>{
    it.name=e.target.value;const el=ge(id);if(el)el.querySelector('.fl').textContent=it.name;autoSave();
  });
  document.getElementById('pw').addEventListener('change',e=>{
    it.w=Math.max(SN,Math.min(parseInt(e.target.value)||1,Math.round(CW/SN)))*SN;
    it.x=Math.min(it.x,CW-it.w);
    const el=ge(id);if(el){el.style.width=it.w+'px';el.style.left=it.x+'px';}
    renderProps(id);autoSave();
  });
  document.getElementById('ph').addEventListener('change',e=>{
    it.h=Math.max(SN,Math.min(parseInt(e.target.value)||1,Math.round(CH/SN)))*SN;
    it.y=Math.min(it.y,CH-it.h);
    const el=ge(id);if(el){el.style.height=it.h+'px';el.style.top=it.y+'px';}
    renderProps(id);autoSave();
  });
}

function changeColor(id,ci){
  const it=gi(id);if(!it)return;
  const c=ITEM_COLORS[ci];it.bg=c.bg;it.fg=c.fg;
  const el=ge(id);if(el){el.style.background=it.bg;el.style.color=it.fg;}
  renderProps(id);autoSave();
}

function delItem(id){
  items=items.filter(i=>i.id!==id);const el=ge(id);if(el)el.remove();
  selectItem(null);updateCount();autoSave();
}

function startMove(e,id){
  selectItem(id);const it=gi(id),el=ge(id),r=el.getBoundingClientRect();
  drag={type:'m',id,it,el,ox:e.clientX-r.left,oy:e.clientY-r.top};e.preventDefault();
}
function startResize(e,id){
  selectItem(id);const it=gi(id),el=ge(id);
  drag={type:'r',id,it,el,sx:e.clientX,sy:e.clientY,sw:it.w,sh:it.h};e.preventDefault();
}

document.addEventListener('mousemove',e=>{
  if(!drag)return;
  const r=cv.getBoundingClientRect();
  if(drag.type==='m'){
    drag.it.x=sg(e.clientX-r.left-drag.ox,0,CW-drag.it.w);
    drag.it.y=sg(e.clientY-r.top-drag.oy,0,CH-drag.it.h);
    drag.el.style.left=drag.it.x+'px';drag.el.style.top=drag.it.y+'px';
  }else{
    const w=Math.max(SN,Math.round((drag.sw+e.clientX-drag.sx)/SN)*SN);
    const h=Math.max(SN,Math.round((drag.sh+e.clientY-drag.sy)/SN)*SN);
    drag.it.w=Math.min(w,CW-drag.it.x);drag.it.h=Math.min(h,CH-drag.it.y);
    drag.el.style.width=drag.it.w+'px';drag.el.style.height=drag.it.h+'px';
  }
});

document.addEventListener('mouseup',()=>{
  if(drag){if(drag.type==='r')renderProps(drag.id);autoSave();drag=null;}
});

cv.addEventListener('mousedown',e=>{
  if(!e.target.closest('.fi'))selectItem(null);
});

function clearAll(){
  items=[];document.querySelectorAll('.fi').forEach(el=>el.remove());
  selectItem(null);updateCount();autoSave();
}

let st=null;
function autoSave(){clearTimeout(st);st=setTimeout(saveLayout,900);}

async function saveLayout(){
  try{
    await writeStore(STORE_KEY,JSON.stringify({items,uid,projectName:projectName()}));
    const b=document.getElementById('svb');
    if(b){
      const orig=b.innerHTML;
      b.classList.add('ok');
      b.innerHTML='<i class="ti ti-check" style="font-size:13px" aria-hidden="true"></i> Saved';
      setTimeout(()=>{b.classList.remove('ok');b.innerHTML=orig;},1500);
    }
  }catch(e){}
}


function exportPDF(){
  selectItem(null);
  saveLayout();
  const oldTitle=document.title;
  document.title=projectName()+' - Studio Layout';
  setTimeout(()=>window.print(),80);
  setTimeout(()=>{document.title=oldTitle;},1200);
}

async function init(){
  updateCanvasSize();
  try{
    const r=await readStore(STORE_KEY);
    if(r&&r.value){
      const d=JSON.parse(r.value);
      items=d.items||[];uid=d.uid||1;setProjectName(d.projectName);
      items.forEach(i=>mkEl(i));
      updateCount();
    }
  }catch(e){}
  try{
    const old=await readStore('jsl-v2');
    if(old&&old.value&&items.length===0){
      const d=JSON.parse(old.value);
      items=d.items||[];uid=d.uid||1;setProjectName(d.projectName);
      items.forEach(i=>mkEl(i));
      updateCount();
    }
  }catch(e){}
}

init();
</script>
